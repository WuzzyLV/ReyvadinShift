# Minimum delay, in milliseconds, before a player can trigger another shift teleport.
# Prevents accidental re-triggering and teleport loops between co-located pads.
cooldown-ms: 500

# Default effects played at both pads of a shift (departure + arrival), visible to everyone.
# Particles form a flat circle at the player's feet.
# Each pad inherits these unless it sets its own override via /shift effect.
# Remove a key to disable that part (e.g. delete `particle` for no circle).
effects:
  particle: PORTAL           # org.bukkit.Particle name, e.g. FLAME, END_ROD, PORTAL
  count: 40                 # points around the circle
  radius: 1.5               # circle radius, in blocks
  sound: entity.enderman.teleport   # Minecraft sound key
  volume: 1.0
  pitch: 1.0
